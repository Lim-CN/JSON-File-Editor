<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON文件编辑器</title>
    <script src="tailwindcss.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        .json-display {
            background-color: #f7fafc;
            border-radius: 0.375rem;
            padding: 1rem;
            overflow-x: auto;
            max-height: 60vh;
        }
        .json-key {
            color: #2d3748;
            font-weight: 600;
        }
        .json-string {
            color: #2b6cb0;
        }
        .json-number {
            color: #d69e2e;
        }
        .json-boolean {
            color: #6b46c1;
        }
        .json-null {
            color: #718096;
        }
        pre {
            margin: 0;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 0.875rem;
            line-height: 1.5;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-8">JSON文件编辑器</h1>
        
        <div class="max-w-3xl mx-auto bg-white rounded-lg shadow-md p-6 mb-6">
            <div class="mb-4">
                <label for="json-file" class="block text-sm font-medium text-gray-700 mb-1">选择 JSON 文件</label>
                <div class="flex items-center gap-4 flex-wrap">
                    <input type="file" id="json-file" accept=".json" class="block w-full md:w-auto text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
                    <button id="edit-btn" class="px-4 py-2 bg-green-500 text-white rounded-md hover:bg-green-600 text-sm font-medium transition-colors" disabled>编辑</button>
                    <button id="save-btn" class="px-4 py-2 bg-blue-500 text-white rounded-md hover:bg-blue-600 text-sm font-medium transition-colors hidden">保存</button>
                    <button id="cancel-btn" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-md hover:bg-gray-300 text-sm font-medium transition-colors hidden">取消</button>
                    <button id="download-btn" class="px-4 py-2 bg-purple-500 text-white rounded-md hover:bg-purple-600 text-sm font-medium transition-colors hidden">下载</button>
                    <button id="download-unicode-btn" class="px-4 py-2 bg-orange-500 text-white rounded-md hover:bg-orange-600 text-sm font-medium transition-colors hidden">下载为unicode</button>
                    <button id="clear-btn" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-md hover:bg-gray-300 text-sm font-medium transition-colors">清空</button>
                </div>
            </div>
            
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    <span id="view-mode-label">预览</span>
                    <span id="edit-mode-label" class="hidden">编辑</span>
                </label>
                <div id="file-info" class="text-sm text-gray-500 mb-2"></div>
                <div id="json-display" class="json-display border border-gray-200"></div>
                <textarea id="json-editor" class="w-full h-96 p-4 border border-gray-200 rounded-md bg-white font-mono text-sm hidden"></textarea>
                <div id="json-error" class="text-red-500 text-sm mt-2 hidden"></div>
            </div>
        </div>
        
        <div class="max-w-3xl mx-auto bg-white rounded-lg shadow-md p-6">
            <h2 class="text-xl font-bold text-gray-800 mb-4">使用说明</h2>
            <ul class="list-disc list-inside text-gray-600 space-y-2">
                <li>点击 "选择文件" 按钮，选择你想要上传的 JSON 文件</li>
                <li>文件将自动解析并在下方展示格式化后的 JSON 内容</li>
                <li>点击 "编辑" 按钮进入编辑模式，修改 JSON 内容</li>
                <li>在编辑模式下，可以点击 "保存" 保存修改，或点击 "取消" 放弃修改</li>
                <li>点击 "下载" 按钮可以下载当前 JSON 文件</li>
                <li>点击 "下载为unicode" 按钮可以将 JSON 内容转换为 Unicode 编码后下载</li>
                <li>可以使用 "清空" 按钮清除当前展示的内容</li>
                <li>支持所有标准 JSON 格式文件</li>
            </ul>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const fileInput = document.getElementById('json-file');
            const jsonDisplay = document.getElementById('json-display');
            const jsonEditor = document.getElementById('json-editor');
            const jsonError = document.getElementById('json-error');
            const fileInfo = document.getElementById('file-info');
            const clearBtn = document.getElementById('clear-btn');
            const editBtn = document.getElementById('edit-btn');
            const saveBtn = document.getElementById('save-btn');
            const cancelBtn = document.getElementById('cancel-btn');
            const downloadBtn = document.getElementById('download-btn');
            const downloadUnicodeBtn = document.getElementById('download-unicode-btn');
            const viewModeLabel = document.getElementById('view-mode-label');
            const editModeLabel = document.getElementById('edit-mode-label');
            
            let currentJson = null;
            let currentFileName = '';
            
            // 格式化 JSON 并添加语法高亮
            function formatJson(jsonObj) {
                return JSON.stringify(jsonObj, null, 2)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    // .replace(/"(\w+)"\s*:/g, '<span class="json-key">"$1"</span>:')
                    .replace(/"([^"\\]*(\\.[^"\\]*)*)"/g, '<span class="json-string">"$1"</span>')
                    .replace(/\b(\d+)\b/g, '<span class="json-number">$1</span>')
                    .replace(/\b(true|false)\b/g, '<span class="json-boolean">$1</span>')
                    .replace(/\b(null)\b/g, '<span class="json-null">$1</span>');
            }
            
            // 更新显示
            function updateDisplay(jsonObj) {
                currentJson = jsonObj;
                const formattedJson = formatJson(jsonObj);
                jsonDisplay.innerHTML = `<pre>${formattedJson}</pre>`;
            }
            
            // 切换到编辑模式
            function switchToEditMode() {
                if (!currentJson) return;
                
                // 填充编辑器内容
                jsonEditor.value = JSON.stringify(currentJson, null, 2);
                
                // 切换显示
                jsonDisplay.classList.add('hidden');
                jsonEditor.classList.remove('hidden');
                jsonError.classList.add('hidden');
                
                // 切换按钮状态
                editBtn.classList.add('hidden');
                saveBtn.classList.remove('hidden');
                cancelBtn.classList.remove('hidden');
                downloadBtn.classList.add('hidden');
                downloadUnicodeBtn.classList.add('hidden');
                clearBtn.classList.add('hidden');
                fileInput.disabled = true;
                
                // 切换标签
                viewModeLabel.classList.add('hidden');
                editModeLabel.classList.remove('hidden');
            }
            
            // 切换到查看模式
            function switchToViewMode() {
                // 切换显示
                jsonDisplay.classList.remove('hidden');
                jsonEditor.classList.add('hidden');
                jsonError.classList.add('hidden');
                
                // 切换按钮状态
                editBtn.classList.remove('hidden');
                saveBtn.classList.add('hidden');
                cancelBtn.classList.add('hidden');
                downloadBtn.classList.remove('hidden');
                downloadUnicodeBtn.classList.remove('hidden');
                clearBtn.classList.remove('hidden');
                fileInput.disabled = false;
                
                // 切换标签
                viewModeLabel.classList.remove('hidden');
                editModeLabel.classList.add('hidden');
            }
            
            // 保存编辑
            function saveEdit() {
                const editorContent = jsonEditor.value;
                
                try {
                    const parsedJson = JSON.parse(editorContent);
                    updateDisplay(parsedJson);
                    switchToViewMode();
                } catch (error) {
                    jsonError.textContent = `JSON 解析错误: ${error.message}`;
                    jsonError.classList.remove('hidden');
                }
            }
            
            // 将字符串转换为Unicode编码
            function stringToUnicode(str) {
                return str.replace(/[\u007F-\uFFFF]/g, function(ch) {
                    return '\\u' + ('0000' + ch.charCodeAt(0).toString(16)).slice(-4);
                });
            }
            
            // 下载 JSON 文件
            function downloadJson() {
                if (!currentJson) return;
                
                const dataStr = JSON.stringify(currentJson, null, 2);
                const dataBlob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(dataBlob);
                const link = document.createElement('a');
                link.href = url;
                link.download = currentFileName || 'edited.json';
                link.click();
                URL.revokeObjectURL(url);
            }
            
            // 下载为 Unicode
            function downloadUnicodeJson() {
                if (!currentJson) return;
                
                const dataStr = JSON.stringify(currentJson, null, 2);
                const unicodeStr = stringToUnicode(dataStr);
                const dataBlob = new Blob([unicodeStr], { type: 'application/json' });
                const url = URL.createObjectURL(dataBlob);
                const link = document.createElement('a');
                const baseName = currentFileName || 'edited';
                const fileName = baseName.replace('.json', '') + '.json';
                link.href = url;
                link.download = fileName;
                link.click();
                URL.revokeObjectURL(url);
            }
            
            // 处理文件上传
            fileInput.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;
                
                // 检查文件类型
                if (file.type !== 'application/json' && !file.name.endsWith('.json')) {
                    alert('请选择 JSON 格式的文件！');
                    return;
                }
                
                currentFileName = file.name;
                
                // 显示文件信息
                fileInfo.textContent = `文件名: ${file.name} | 大小: ${(file.size / 1024).toFixed(2)} KB`;
                
                // 读取文件内容
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const jsonObj = JSON.parse(e.target.result);
                        updateDisplay(jsonObj);
                        
                        // 启用编辑按钮
                        editBtn.disabled = false;
                        downloadBtn.classList.remove('hidden');
                        downloadUnicodeBtn.classList.remove('hidden');
                    } catch (error) {
                        jsonDisplay.innerHTML = `<div class="text-red-500 font-medium">JSON 解析错误: ${error.message}</div>`;
                        editBtn.disabled = true;
                        downloadBtn.classList.add('hidden');
                        downloadUnicodeBtn.classList.add('hidden');
                    }
                };
                reader.readAsText(file);
            });
            
            // 清空功能
            clearBtn.addEventListener('click', function() {
                fileInput.value = '';
                fileInfo.textContent = '';
                jsonDisplay.innerHTML = '';
                jsonEditor.value = '';
                jsonError.classList.add('hidden');
                currentJson = null;
                currentFileName = '';
                
                // 禁用按钮
                editBtn.disabled = true;
                downloadBtn.classList.add('hidden');
                downloadUnicodeBtn.classList.add('hidden');
            });
            
            // 编辑按钮点击事件
            editBtn.addEventListener('click', switchToEditMode);
            
            // 保存按钮点击事件
            saveBtn.addEventListener('click', saveEdit);
            
            // 取消按钮点击事件
            cancelBtn.addEventListener('click', switchToViewMode);
            
            // 下载按钮点击事件
            downloadBtn.addEventListener('click', downloadJson);
            
            // 下载为unicode按钮点击事件
            downloadUnicodeBtn.addEventListener('click', downloadUnicodeJson);
            
            // 编辑器内容变化时隐藏错误
            jsonEditor.addEventListener('input', function() {
                jsonError.classList.add('hidden');
            });
        });
    </script>
</body>
</html>
