<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON文件编辑器</title>
    <script src="tailwindcss.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        .json-display {
            background-color: #f7fafc;
            border-radius: 0.375rem;
            padding: 1rem;
            overflow-x: auto;
            max-height: 60vh;
        }
        .json-key {
            color: #2d3748;
            font-weight: 600;
        }
        .json-string {
            color: #2b6cb0;
        }
        .json-number {
            color: #d69e2e;
        }
        .json-boolean {
            color: #6b46c1;
        }
        .json-null {
            color: #718096;
        }
        pre {
            margin: 0;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 0.875rem;
            line-height: 1.5;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-8">JSON文件编辑器</h1>
        
        <div class="max-w-3xl mx-auto bg-white rounded-lg shadow-md p-6 mb-6">
            <div class="mb-4">
                <label for="json-file" class="block text-sm font-medium text-gray-700 mb-1">选择 JSON 文件</label>
                <div class="flex items-center gap-4 flex-wrap">
                    <input type="file" id="json-file" accept=".json" class="block w-full md:w-auto text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
                    <button id="preview-btn" class="px-4 py-2 bg-green-500 text-white rounded-md hover:bg-green-600 text-sm font-medium transition-colors">预览</button>
                    <button id="download-btn" class="px-4 py-2 bg-purple-500 text-white rounded-md hover:bg-purple-600 text-sm font-medium transition-colors">下载</button>
                    <button id="download-unicode-btn" class="px-4 py-2 bg-orange-500 text-white rounded-md hover:bg-orange-600 text-sm font-medium transition-colors">下载为unicode</button>
                    <button id="clear-btn" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-md hover:bg-gray-300 text-sm font-medium transition-colors">清空</button>
                </div>
            </div>
            
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    <span id="edit-mode-label">编辑</span>
                    <span id="view-mode-label" class="hidden">预览</span>
                </label>
                <div id="file-info" class="text-sm text-gray-500 mb-2"></div>
                <textarea id="json-editor" class="w-full h-96 p-4 border border-gray-200 rounded-md bg-white font-mono text-sm" placeholder="在此输入或编辑 JSON..."></textarea>
                <div id="json-display" class="json-display border border-gray-200 hidden"></div>
                <div id="json-error" class="text-red-500 text-sm mt-2 hidden"></div>
            </div>
        </div>
        
        <div class="max-w-3xl mx-auto bg-white rounded-lg shadow-md p-6">
            <h2 class="text-xl font-bold text-gray-800 mb-4">使用说明</h2>
            <ul class="list-disc list-inside text-gray-600 space-y-2">
                <li>直接在文本框中输入或编辑 JSON 内容，无需先上传文件</li>
                <li>点击 "选择文件" 按钮，可以上传 JSON 文件，文件内容将自动填入文本框</li>
                <li>点击 "预览" 按钮，可以查看格式化并带有语法高亮的 JSON 内容</li>
                <li>在预览模式下，点击 "编辑" 按钮返回编辑模式</li>
                <li>点击 "下载" 按钮可以下载当前 JSON 文件</li>
                <li>点击 "下载为unicode" 按钮可以将 JSON 内容转换为 Unicode 编码后下载</li>
                <li>可以使用 "清空" 按钮清除当前所有内容</li>
                <li>支持所有标准 JSON 格式文件</li>
            </ul>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const fileInput = document.getElementById('json-file');
            const jsonDisplay = document.getElementById('json-display');
            const jsonEditor = document.getElementById('json-editor');
            const jsonError = document.getElementById('json-error');
            const fileInfo = document.getElementById('file-info');
            const clearBtn = document.getElementById('clear-btn');
            const previewBtn = document.getElementById('preview-btn');
            const downloadBtn = document.getElementById('download-btn');
            const downloadUnicodeBtn = document.getElementById('download-unicode-btn');
            const viewModeLabel = document.getElementById('view-mode-label');
            const editModeLabel = document.getElementById('edit-mode-label');
            
            let currentJson = null;
            let currentFileName = '';
            let isPreviewMode = false;
            
            // 格式化 JSON 并添加语法高亮
            function formatJson(jsonObj) {
                return JSON.stringify(jsonObj, null, 2)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"(\w+)"\s*:/g, '<span class="json-key">"$1"</span>:')
                    .replace(/"([^"\\]*(\\.[^"\\]*)*)"/g, '<span class="json-string">"$1"</span>')
                    .replace(/\b(\d+)\b/g, '<span class="json-number">$1</span>')
                    .replace(/\b(true|false)\b/g, '<span class="json-boolean">$1</span>')
                    .replace(/\b(null)\b/g, '<span class="json-null">$1</span>');
            }
            
            // 切换到预览模式
            function switchToPreviewMode() {
                const editorContent = jsonEditor.value.trim();
                
                if (!editorContent) {
                    jsonError.textContent = 'JSON 内容不能为空';
                    jsonError.classList.remove('hidden');
                    return;
                }
                
                try {
                    const parsedJson = JSON.parse(editorContent);
                    currentJson = parsedJson;
                    
                    // 格式化并显示
                    const formattedJson = formatJson(parsedJson);
                    jsonDisplay.innerHTML = `<pre>${formattedJson}</pre>`;
                    
                    // 切换显示
                    jsonEditor.classList.add('hidden');
                    jsonDisplay.classList.remove('hidden');
                    jsonError.classList.add('hidden');
                    
                    // 切换按钮和标签
                    previewBtn.textContent = '编辑';
                    editModeLabel.classList.add('hidden');
                    viewModeLabel.classList.remove('hidden');
                    isPreviewMode = true;
                } catch (error) {
                    jsonError.textContent = `JSON 解析错误: ${error.message}`;
                    jsonError.classList.remove('hidden');
                }
            }
            
            // 切换到编辑模式
            function switchToEditMode() {
                jsonEditor.classList.remove('hidden');
                jsonDisplay.classList.add('hidden');
                jsonError.classList.add('hidden');
                
                previewBtn.textContent = '预览';
                viewModeLabel.classList.add('hidden');
                editModeLabel.classList.remove('hidden');
                isPreviewMode = false;
            }
            
            // 将字符串转换为Unicode编码
            function stringToUnicode(str) {
                return str.replace(/[\u007F-\uFFFF]/g, function(ch) {
                    return '\\u' + ('0000' + ch.charCodeAt(0).toString(16)).slice(-4);
                });
            }
            
            // 获取当前 JSON 对象
            function getCurrentJson() {
                if (isPreviewMode && currentJson) {
                    return currentJson;
                }
                
                const editorContent = jsonEditor.value.trim();
                if (!editorContent) return null;
                
                try {
                    return JSON.parse(editorContent);
                } catch (error) {
                    jsonError.textContent = `JSON 解析错误: ${error.message}`;
                    jsonError.classList.remove('hidden');
                    return null;
                }
            }
            
            // 下载 JSON 文件
            function downloadJson() {
                const jsonToDownload = getCurrentJson();
                if (!jsonToDownload) {
                    alert('请先输入有效的 JSON 内容');
                    return;
                }
                
                const dataStr = JSON.stringify(jsonToDownload, null, 2);
                const dataBlob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(dataBlob);
                const link = document.createElement('a');
                link.href = url;
                link.download = currentFileName || 'edited.json';
                link.click();
                URL.revokeObjectURL(url);
            }
            
            // 下载为 Unicode
            function downloadUnicodeJson() {
                const jsonToDownload = getCurrentJson();
                if (!jsonToDownload) {
                    alert('请先输入有效的 JSON 内容');
                    return;
                }
                
                const dataStr = JSON.stringify(jsonToDownload, null, 2);
                const unicodeStr = stringToUnicode(dataStr);
                const dataBlob = new Blob([unicodeStr], { type: 'application/json' });
                const url = URL.createObjectURL(dataBlob);
                const link = document.createElement('a');
                const baseName = currentFileName || 'edited';
                const fileName = baseName.replace('.json', '') + '_unicode.json';
                link.href = url;
                link.download = fileName;
                link.click();
                URL.revokeObjectURL(url);
            }
            
            // 处理文件上传
            fileInput.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;
                
                // 检查文件类型
                if (file.type !== 'application/json' && !file.name.endsWith('.json')) {
                    alert('请选择 JSON 格式的文件！');
                    return;
                }
                
                currentFileName = file.name;
                
                // 显示文件信息
                fileInfo.textContent = `文件名: ${file.name} | 大小: ${(file.size / 1024).toFixed(2)} KB`;
                
                // 读取文件内容
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const jsonObj = JSON.parse(e.target.result);
                        jsonEditor.value = JSON.stringify(jsonObj, null, 2);
                        currentJson = jsonObj;
                        
                        // 确保在编辑模式
                        if (isPreviewMode) {
                            switchToEditMode();
                        }
                    } catch (error) {
                        jsonError.textContent = `JSON 解析错误: ${error.message}`;
                        jsonError.classList.remove('hidden');
                    }
                };
                reader.readAsText(file);
            });
            
            // 清空功能
            clearBtn.addEventListener('click', function() {
                fileInput.value = '';
                fileInfo.textContent = '';
                jsonDisplay.innerHTML = '';
                jsonEditor.value = '';
                jsonError.classList.add('hidden');
                currentJson = null;
                currentFileName = '';
                
                // 确保在编辑模式
                if (isPreviewMode) {
                    switchToEditMode();
                }
            });
            
            // 预览/编辑按钮点击事件
            previewBtn.addEventListener('click', function() {
                if (isPreviewMode) {
                    switchToEditMode();
                } else {
                    switchToPreviewMode();
                }
            });
            
            // 下载按钮点击事件
            downloadBtn.addEventListener('click', downloadJson);
            
            // 下载为unicode按钮点击事件
            downloadUnicodeBtn.addEventListener('click', downloadUnicodeJson);
            
            // 编辑器内容变化时隐藏错误
            jsonEditor.addEventListener('input', function() {
                jsonError.classList.add('hidden');
            });
        });
    </script>
</body>
</html>
